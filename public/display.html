<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1, user-scalable=no">
<title>Clock Dock</title>
<link rel="stylesheet" href="/css/themes.css">
<link rel="stylesheet" href="/css/base.css">
</head>
<body>
<canvas id="sky"></canvas>
<canvas id="sky-fx"></canvas>
<div id="dim-overlay"></div>

<div id="sound-arm">
  <div class="sa-btn">🔊 Tap to enable adhan sound</div>
  <div style="font-size:0.8rem;color:var(--text-dim)">Your browser blocked autoplay. One tap fixes it for this session.</div>
</div>

<div id="adhan-overlay">
  <div class="adhan-now" id="adhan-now">Playing Adhan</div>
  <button class="adhan-stop-btn" id="adhan-stop" type="button">Stop Adhan</button>
</div>

<div class="app">

  <!-- Ramadan / special-day banner -->
  <div class="banner" id="banner">
    <div>
      <div class="np-label" id="banner-kicker">Ramadan</div>
      <div class="b-title" id="banner-title">—</div>
    </div>
    <div class="b-count" id="banner-count"></div>
  </div>

  <div class="topbar">
    <div class="eyebrow" id="loc">—</div>
    <div class="topbar-right">
      <div class="stale-hint" id="stale" hidden>weather offline — showing last update</div>
      <button class="icon-btn" id="fullscreen-btn" type="button" title="Enter fullscreen" aria-label="Toggle fullscreen"><span id="fullscreen-icon">⛶</span></button>
    </div>
  </div>

  <div class="grid">
    <!-- LEFT -->
    <div class="col">
      <!-- CLOCK HERO — half-screen widget, shares the left column with the hadith card -->
      <div class="card hero">
        <div class="ampm-badge" id="ampm-badge"></div>
        <div class="clock tnum" id="clock" data-style="standard">--:--</div>
        <div class="datebar">
          <div class="greg" id="greg">—</div>
          <div class="hijri" id="hijri">—</div>
        </div>
      </div>

      <div class="card hadith-card hide-on-focus" id="hadith-card">
        <h2 class="section-title">Hadith of the day</h2>
        <div class="hadith-chapter" id="hadith-chapter"></div>
        <div class="hadith-text" id="hadith-text">—</div>
        <div class="hadith-src" id="hadith-src"></div>
      </div>
    </div>

    <!-- RIGHT -->
    <div class="col">
      <div class="card wx-hero">
        <h2 class="section-title">Weather</h2>
        <div class="wx-main">
          <div class="wx-icon" id="wx-icon">—</div>
          <div class="wx-temp tnum" id="wx-temp">--°</div>
          <div class="wx-side">
            <div class="wx-cond" id="wx-cond">Loading…</div>
            <div class="wx-sub" id="wx-place"></div>
            <div class="wx-stats" id="wx-stats"></div>
          </div>
        </div>
        <div class="wx-forecast" id="wx-forecast"></div>
      </div>

      <div class="card hide-on-focus">
        <h2 class="section-title">This week</h2>
        <div class="week-strip" id="week"></div>
        <h2 class="section-title">Upcoming</h2>
        <div id="agenda"></div>
      </div>

      <div class="card prayer-card">
        <div class="np-bar">
          <div class="arc-wrap">
            <svg viewBox="0 0 74 74">
              <circle class="arc-track" cx="37" cy="37" r="30"></circle>
              <circle class="arc-fill" id="arc" cx="37" cy="37" r="30" stroke-dasharray="188.5" stroke-dashoffset="188.5"></circle>
            </svg>
            <div class="arc-label" id="arc-pct">--</div>
          </div>
          <div class="np-info">
            <div class="np-name" id="np-name">—</div>
          </div>
          <div class="np-time tnum" id="np-time">—</div>
          <div class="np-in" id="np-in">—</div>
        </div>
        <div class="prayer-grid" id="prayers"></div>
      </div>
    </div>
  </div>

  <div class="footer">
    <div class="qr" id="qr" hidden></div>
    <div>Edit from your phone → <code id="settings-url">…</code></div>
  </div>
</div>

<!-- adhan / iqamah audio (src set at runtime). Fajr gets its own element so
     preloading/playing the once-a-day Fajr recording never forces the
     regular adhan element (used 4x/day) to drop its buffered audio. -->
<audio id="audio-adhan" preload="auto"></audio>
<audio id="audio-adhan-fajr" preload="auto"></audio>
<audio id="audio-iqamah" preload="auto"></audio>

<script src="/js/sky.js"></script>
<script src="/js/display.js"></script>
</body>
</html>
